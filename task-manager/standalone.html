<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager App</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect } = React;

      // Task Form Component
      function TaskForm({ onAddTask }) {
        const [text, setText] = useState('');

        const handleSubmit = (e) => {
          e.preventDefault();
          if (text.trim()) {
            onAddTask(text);
            setText('');
          }
        };

        return (
          <form onSubmit={handleSubmit} className="flex gap-3">
            <input
              type="text"
              value={text}
              onChange={(e) => setText(e.target.value)}
              placeholder="Add a new task..."
              className="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            />
            <button
              type="submit"
              className="px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors font-medium"
            >
              Add Task
            </button>
          </form>
        );
      }

      // Task List Component
      function TaskList({ tasks, onToggleTask, onDeleteTask }) {
        if (tasks.length === 0) {
          return (
            <div className="text-center py-8 text-gray-500">
              <div className="text-4xl mb-2">📝</div>
              <p className="text-lg">No tasks yet!</p>
              <p className="text-sm">Add your first task above to get started.</p>
            </div>
          );
        }

        return (
          <div className="space-y-2">
            {tasks.map((task) => (
              <div
                key={task.id}
                className={`flex items-center gap-3 p-4 rounded-lg border transition-all ${
                  task.completed 
                    ? 'bg-gray-50 border-gray-200' 
                    : 'bg-white border-gray-200 hover:shadow-md'
                }`}
              >
                <button
                  onClick={() => onToggleTask(task.id)}
                  className={`flex-shrink-0 w-5 h-5 rounded-full border-2 flex items-center justify-center transition-colors ${
                    task.completed
                      ? 'bg-green-500 border-green-500 text-white'
                      : 'border-gray-300 hover:border-green-500'
                  }`}
                >
                  {task.completed && '✓'}
                </button>
                
                <div className="flex-1 min-w-0">
                  <p className={`text-sm font-medium ${
                    task.completed ? 'text-gray-500 line-through' : 'text-gray-900'
                  }`}>
                    {task.text}
                  </p>
                  <p className="text-xs text-gray-400 mt-1">
                    {task.createdAt.toLocaleDateString()} at {task.createdAt.toLocaleTimeString([], { 
                      hour: '2-digit', 
                      minute: '2-digit' 
                    })}
                  </p>
                </div>
                
                <button
                  onClick={() => onDeleteTask(task.id)}
                  className="flex-shrink-0 p-2 text-gray-400 hover:text-red-500 transition-colors"
                  title="Delete task"
                >
                  🗑️
                </button>
              </div>
            ))}
          </div>
        );
      }

      // Filter Buttons Component
      function FilterButtons({ currentFilter, onFilterChange, onClearCompleted, hasCompletedTasks }) {
        const filterButtons = [
          { key: 'all', label: 'All Tasks', icon: '📋' },
          { key: 'active', label: 'Active', icon: '⚡' },
          { key: 'completed', label: 'Completed', icon: '✅' }
        ];

        return (
          <div className="flex flex-col sm:flex-row gap-3 items-center">
            <div className="flex gap-2 flex-1">
              {filterButtons.map((filter) => (
                <button
                  key={filter.key}
                  onClick={() => onFilterChange(filter.key)}
                  className={`flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-colors ${
                    currentFilter === filter.key
                      ? 'bg-blue-500 text-white'
                      : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                  }`}
                >
                  <span>{filter.icon}</span>
                  <span className="text-sm">{filter.label}</span>
                </button>
              ))}
            </div>
            
            {hasCompletedTasks && (
              <button
                onClick={onClearCompleted}
                className="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors font-medium text-sm"
              >
                Clear Completed
              </button>
            )}
          </div>
        );
      }

      // Main App Component
      function App() {
        const [tasks, setTasks] = useState([]);
        const [filter, setFilter] = useState('all');

        // Load tasks from localStorage on component mount
        useEffect(() => {
          const savedTasks = localStorage.getItem('tasks');
          if (savedTasks) {
            try {
              const parsedTasks = JSON.parse(savedTasks).map((task) => ({
                ...task,
                createdAt: new Date(task.createdAt)
              }));
              setTasks(parsedTasks);
            } catch (error) {
              console.error('Error parsing saved tasks:', error);
            }
          }
        }, []);

        // Save tasks to localStorage whenever tasks change
        useEffect(() => {
          localStorage.setItem('tasks', JSON.stringify(tasks));
        }, [tasks]);

        const addTask = (text) => {
          const newTask = {
            id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
            text: text.trim(),
            completed: false,
            createdAt: new Date()
          };
          setTasks(prevTasks => [...prevTasks, newTask]);
        };

        const toggleTask = (id) => {
          setTasks(prevTasks =>
            prevTasks.map(task =>
              task.id === id ? { ...task, completed: !task.completed } : task
            )
          );
        };

        const deleteTask = (id) => {
          setTasks(prevTasks => prevTasks.filter(task => task.id !== id));
        };

        const clearCompleted = () => {
          setTasks(prevTasks => prevTasks.filter(task => !task.completed));
        };

        const filteredTasks = tasks.filter(task => {
          if (filter === 'active') return !task.completed;
          if (filter === 'completed') return task.completed;
          return true;
        });

        const activeTasks = tasks.filter(task => !task.completed).length;
        const completedTasks = tasks.filter(task => task.completed).length;

        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
            <div className="container mx-auto px-4 py-8">
              <div className="max-w-2xl mx-auto">
                {/* Header */}
                <div className="text-center mb-8">
                  <h1 className="text-4xl font-bold text-gray-800 mb-2">Task Manager</h1>
                  <p className="text-gray-600">Stay organized and productive</p>
                </div>

                {/* Task Form */}
                <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
                  <TaskForm onAddTask={addTask} />
                </div>

                {/* Stats */}
                <div className="grid grid-cols-3 gap-4 mb-6">
                  <div className="bg-white rounded-lg p-4 text-center shadow-md">
                    <div className="text-2xl font-bold text-gray-800">{tasks.length}</div>
                    <div className="text-sm text-gray-600">Total Tasks</div>
                  </div>
                  <div className="bg-white rounded-lg p-4 text-center shadow-md">
                    <div className="text-2xl font-bold text-yellow-600">{activeTasks}</div>
                    <div className="text-sm text-gray-600">Active</div>
                  </div>
                  <div className="bg-white rounded-lg p-4 text-center shadow-md">
                    <div className="text-2xl font-bold text-green-600">{completedTasks}</div>
                    <div className="text-sm text-gray-600">Completed</div>
                  </div>
                </div>

                {/* Filter Buttons */}
                <div className="bg-white rounded-lg shadow-lg p-6 mb-6">
                  <FilterButtons 
                    currentFilter={filter} 
                    onFilterChange={setFilter}
                    onClearCompleted={clearCompleted}
                    hasCompletedTasks={completedTasks > 0}
                  />
                </div>

                {/* Task List */}
                <div className="bg-white rounded-lg shadow-lg p-6">
                  <TaskList 
                    tasks={filteredTasks} 
                    onToggleTask={toggleTask}
                    onDeleteTask={deleteTask}
                  />
                </div>
              </div>
            </div>
          </div>
        );
      }

      // Render the App
      ReactDOM.render(<App />, document.getElementById('root'));
    </script>
  </body>
</html>
